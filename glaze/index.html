  --white: #ffffff;
  --gray-50: #f8fafb;
  --gray-100: #f0f4f6;

  --gray-300: #cbd5e1;

  --gray-600: #475569;

  --radius-lg: 20px;
  --max: 1140px;
  --shadow: 0 2px 16px rgba(0,0,0,0.06);

}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {

}

.section-desc {

  overflow: hidden;
  min-height: 560px;

.hero-badge {

}
.hero-image img {

}

.img-text {
  display: grid; grid-template-columns: 1fr 1fr; gap: 64px; align-items: center;
}
.img-text.reverse { direction: rtl; }
.img-text.reverse > * { direction: ltr; }
.img-text-image {
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: var(--shadow-lg);
}
.img-text-image img { width: 100%; }

/* Full-width Image */
.full-img {

  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.full-img img {
  width: 100%; max-height: 560px; object-fit: cover;
}

.colors-grid {
  display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px; margin-top: 32px;
}
.color-card {
  text-align: center;
  background: var(--gray-50);

  transition: border-color 0.3s;
}
.color-card:hover { border-color: var(--blue); }
.color-swatch {
  width: 80px; height: 80px; border-radius: 50%;

}
.color-name {
  font-size: 16px; font-weight: 600; color: var(--navy);
}

/* Features Grid */
.features-grid {

.feature-card {
  background: var(--white);
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-lg);
  padding: 32px 24px;
  text-align: center;
  transition: all 0.3s;
}
.feature-card:hover {

  box-shadow: var(--shadow-lg);
  border-color: var(--blue-light);
}
.feature-card img { width: 120px; margin: 0 auto 20px; }
.feature-name {
  font-size: 18px; font-weight: 700; color: var(--navy); margin-bottom: 8px;
}
.feature-desc {
  font-size: 14px; color: var(--gray-500); line-height: 1.6;
}

/* Filter System */
.filter-steps {

}
.filter-step {
  text-align: center;
  padding: 32px 20px;
  background: var(--white);
  border-radius: var(--radius-lg);

}
.filter-step img { width: 64px; margin: 0 auto 20px; }
.filter-step-num {

}
.filter-step h4 {
  font-size: 15px; font-weight: 700; color: var(--navy); margin-bottom: 8px;
  line-height: 1.3;
}
.filter-step p {

}
.filter-code {

.specs-table {

.specs-table th, .specs-table td {

/* Disclaimer */

}

/* Gallery strip */
.gallery-strip {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;
  margin-top: 32px;
}
.gallery-strip img {
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  transition: transform 0.3s;
}
.gallery-strip img:hover { transform: scale(1.02); }

/* Footer */
.footer {
  background: var(--gray-50);
  border-top: 1px solid var(--gray-200);
  padding: 40px 0;
  text-align: center;
}
.footer-links {
  display: flex; gap: 24px; justify-content: center; flex-wrap: wrap;
  margin-bottom: 16px;
}
.footer-links a { font-size: 13px; color: var(--gray-500); transition: color 0.2s; }
.footer-links a:hover { color: var(--blue); }
.footer-copy { font-size: 12px; color: var(--gray-400); }

/* Floating WA */
.float-wa {
  position: fixed; bottom: 24px; right: 24px; z-index: 200;
  background: var(--wa); color: #fff;
  width: 56px; height: 56px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 20px rgba(37,211,102,0.4);
  transition: all 0.3s;

.float-wa:hover { transform: scale(1.1); }

/* Responsive */
@media (max-width: 768px) {

  .hero-cta { margin: 0 auto; }
  .hero-image img { max-height: 300px; }
  .img-text { grid-template-columns: 1fr; gap: 32px; }
  .img-text.reverse { direction: ltr; }
  .features-grid { grid-template-columns: 1fr; }
  .filter-steps { grid-template-columns: repeat(2, 1fr); }
  .pricing-grid { grid-template-columns: 1fr; }
  .colors-grid { grid-template-columns: 1fr; }
  .specs-table th { width: 140px; font-size: 13px; }
  .specs-table td { font-size: 13px; }
  .gallery-strip { grid-template-columns: repeat(2, 1fr); }
  .nav-logo { font-size: 18px; }
  .nav-cta { padding: 8px 16px; font-size: 13px; }
  .hero h1 { font-size: 32px; }
  .hero-price { font-size: 36px; }
}
@media (max-width: 480px) {
  .container { padding: 0 16px; }
  .filter-steps { grid-template-columns: 1fr; }
  .gallery-strip { grid-template-columns: 1fr; }
}
